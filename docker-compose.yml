services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eurs
      POSTGRES_PASSWORD: eurs
      POSTGRES_DB: eurs
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eurs -d eurs"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://eurs:eurs@db:5432/eurs
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-please-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      EMP_API_BASE: ${EMP_API_BASE:-http://172.16.105.117/emp}
      SSO_API_KEY: ${SSO_API_KEY}
      MAIL_API_BASE: ${MAIL_API_BASE:-http://172.16.105.117/app}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
      MAX_ATTACHMENTS_PER_REQUEST: "5"
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
